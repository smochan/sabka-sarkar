<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1500px; height: 500px; overflow: hidden; }
  .stage {
    width: 1500px; height: 500px; position: relative;
    background: radial-gradient(120% 140% at 78% 30%, #faf6ee 0%, #f4efe7 52%, #ece5d7 100%);
    font-family: "Fraunces", Georgia, "Times New Roman", serif;
  }
  /* top tricolor rail (matches OG cards) */
  .rail { position: absolute; top: 0; left: 0; width: 100%; height: 12px; display: flex; }
  .rail > div { flex: 1; }

  /* left emblem echo — kept in the upper area, clear of the bottom-left avatar overlap zone */
  .emblem { position: absolute; left: 132px; top: 150px; }

  /* text block — lives in the right ~68%, vertically centered (mobile-crop safe) */
  .copy {
    position: absolute; left: 470px; top: 50%; transform: translateY(-50%);
    width: 920px;
  }
  .eyebrow {
    font-family: "Inter", Arial, sans-serif;
    text-transform: uppercase; letter-spacing: 6px;
    font-size: 19px; font-weight: 600; color: #b8631a;
    margin-bottom: 16px;
  }
  .headline {
    font-size: 60px; line-height: 1.08; color: #1a1714;
    font-weight: 400; letter-spacing: -0.5px; max-width: 880px;
  }
  .headline .accent { color: #138808; }
  .footer {
    display: flex; align-items: baseline; gap: 22px; margin-top: 34px;
  }
  .wordmark { font-size: 30px; font-weight: 600; color: #1a1714; }
  .deva {
    font-family: "Tiro Devanagari Hindi", "Kohinoor Devanagari", "Devanagari Sangam MN", serif;
    font-size: 26px; color: #4a4234;
  }
  .url {
    font-family: "Inter", Arial, sans-serif; font-size: 22px; color: #FF9933; font-weight: 600;
    margin-left: auto;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="rail">
      <div style="background:#FF9933"></div>
      <div style="background:#f4efe7"></div>
      <div style="background:#138808"></div>
    </div>

    <!-- emblem echo -->
    <svg class="emblem" width="210" height="210" viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
      <rect x="14"  y="92"  width="38" height="64"  rx="19" fill="#FF9933"/>
      <rect x="66"  y="64"  width="38" height="92"  rx="19" fill="#ffffff" stroke="#5c5141" stroke-opacity="0.34" stroke-width="2"/>
      <rect x="118" y="34"  width="38" height="122" rx="19" fill="#138808"/>
      <rect x="14"  y="168" width="142" height="9" rx="4.5" fill="#1a1714" opacity="0.9"/>
    </svg>

    <div class="copy">
      <div class="eyebrow">An open thought experiment for India</div>
      <div class="headline">If the best of our generation<br/>ran the <span class="accent">country.</span></div>
      <div class="footer">
        <span class="wordmark">Sabka Sarkar</span>
        <span class="deva">सबकी सरकार</span>
        <span class="url">sabkasarkar.com</span>
      </div>
    </div>
  </div>
</body>
</html>
