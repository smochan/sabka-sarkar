<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@600;700&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1500px; height: 500px; overflow: hidden; }
  .stage {
    width: 1500px; height: 500px; position: relative;
    background: radial-gradient(120% 150% at 80% 35%, #ffffff 0%, #f1f4f8 56%, #e6ebf1 100%);
    font-family: "Teko", "Arial Narrow", sans-serif;
  }
  /* navy chakra watermark, right side */
  #chakra { position: absolute; right: -120px; top: 50%; transform: translateY(-50%); }
  /* top tricolor rail — white centre framed so it stays visible */
  .rail { position: absolute; top: 0; left: 0; width: 100%; height: 12px; display: flex; }
  .rail > div { flex: 1; }
  .rail .white { border-top: 1px solid rgba(20,17,13,.25); border-bottom: 1px solid rgba(20,17,13,.25); }
  /* bottom heavy ink rule */
  .baserule { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #14110d; }

  .emblem { position: absolute; left: 130px; top: 128px; }

  .copy { position: absolute; left: 470px; top: 50%; transform: translateY(-50%); width: 960px; }
  .eyebrow {
    font-family: "Inter", Arial, sans-serif;
    text-transform: uppercase; letter-spacing: 6px;
    font-size: 18px; font-weight: 700; color: #b8631a; margin-bottom: 14px;
  }
  .headline {
    font-size: 92px; line-height: 0.92; color: #14110d;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; max-width: 940px;
  }
  .headline .accent { color: #ff8a1f; }
  .footer { display: flex; align-items: center; gap: 22px; margin-top: 30px; }
  .wordmark { font-size: 38px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #14110d; }
  .deva {
    font-family: "Tiro Devanagari Hindi", "Kohinoor Devanagari", "Devanagari Sangam MN", serif;
    font-size: 26px; color: #3a342b;
  }
  .url {
    font-family: "Inter", Arial, sans-serif; font-size: 22px; color: #b8631a; font-weight: 700;
    margin-left: auto;
  }
</style>
</head>
<body>
  <div class="stage">
    <svg id="chakra" width="520" height="520" viewBox="0 0 520 520"></svg>

    <div class="rail">
      <div style="background:#ff8a1f"></div>
      <div class="white" style="background:#ffffff"></div>
      <div style="background:#0f7a2e"></div>
    </div>

    <!-- rising-bars emblem -->
    <svg class="emblem" width="200" height="200" viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
      <rect x="14"  y="92"  width="38" height="64"  rx="5" fill="#ff8a1f"/>
      <rect x="66"  y="64"  width="38" height="92"  rx="5" fill="#ffffff" stroke="#14110d" stroke-opacity="0.5" stroke-width="2.5"/>
      <rect x="118" y="34"  width="38" height="122" rx="5" fill="#0f7a2e"/>
      <rect x="12"  y="168" width="146" height="9" rx="2" fill="#14110d"/>
    </svg>

    <div class="copy">
      <div class="eyebrow">An open thought experiment for India</div>
      <div class="headline">If the best of our generation ran the <span class="accent">country.</span></div>
      <div class="footer">
        <span class="wordmark">Sabka Sarkar</span>
        <span class="deva">सबकी सरकार</span>
        <span class="url">sabkasarkar.com</span>
      </div>
    </div>

    <div class="baserule"></div>
  </div>

  <script>
    const NS = "http://www.w3.org/2000/svg";
    const c = document.getElementById("chakra");
    const cx = 260, cy = 260, inner = 78, outer = 250, col = "#21317f", op = 0.10;
    function ring(r, sw){const e=document.createElementNS(NS,"circle");e.setAttribute("cx",cx);e.setAttribute("cy",cy);e.setAttribute("r",r);e.setAttribute("fill","none");e.setAttribute("stroke",col);e.setAttribute("stroke-width",sw);e.setAttribute("opacity",op);c.appendChild(e);}
    ring(outer,6); ring(outer-12,3); ring(inner,6);
    for(let i=0;i<24;i++){const a=i*15*Math.PI/180;const l=document.createElementNS(NS,"line");l.setAttribute("x1",cx+inner*Math.sin(a));l.setAttribute("y1",cy-inner*Math.cos(a));l.setAttribute("x2",cx+outer*Math.sin(a));l.setAttribute("y2",cy-outer*Math.cos(a));l.setAttribute("stroke",col);l.setAttribute("stroke-width",2.5);l.setAttribute("opacity",op);c.appendChild(l);}
  </script>
</body>
</html>
