<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1000px; height: 1000px; overflow: hidden; }
  .stage {
    width: 1000px; height: 1000px; position: relative;
    /* clean cool near-white (matches the site, not the old warm cream) */
    background: radial-gradient(circle at 50% 44%, #ffffff 0%, #f1f4f8 60%, #e7ecf2 100%);
  }
  svg { display: block; position: absolute; inset: 0; }
</style>
</head>
<body>
  <div class="stage">
    <!-- faint navy Ashoka chakra watermark (built by script) -->
    <svg id="chakra" width="1000" height="1000" viewBox="0 0 1000 1000"></svg>

    <!-- emblem: three rising bars + ink baseline -->
    <svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1b2440" flood-opacity="0.14"/>
        </filter>
      </defs>
      <g filter="url(#soft)">
        <rect x="291" y="430" width="116" height="160" rx="10" fill="#ff8a1f"/>
        <rect x="442" y="350" width="116" height="240" rx="10" fill="#ffffff"
              stroke="#14110d" stroke-opacity="0.5" stroke-width="3"/>
        <rect x="593" y="262" width="116" height="328" rx="10" fill="#0f7a2e"/>
      </g>
      <!-- ink baseline rule -->
      <rect x="285" y="612" width="430" height="16" rx="2" fill="#14110d"/>
      <!-- tricolor ticks -->
      <rect x="291" y="650" width="126" height="12" rx="2" fill="#ff8a1f"/>
      <rect x="437" y="650" width="126" height="12" rx="2" fill="#ffffff" stroke="#14110d" stroke-opacity="0.35" stroke-width="2"/>
      <rect x="583" y="650" width="126" height="12" rx="2" fill="#0f7a2e"/>
    </svg>
  </div>

  <script>
    const NS = "http://www.w3.org/2000/svg";
    const c = document.getElementById("chakra");
    const cx = 500, cy = 446, inner = 118, outer = 360, col = "#21317f", op = 0.08;
    function ring(r, sw) {
      const e = document.createElementNS(NS, "circle");
      e.setAttribute("cx", cx); e.setAttribute("cy", cy); e.setAttribute("r", r);
      e.setAttribute("fill", "none"); e.setAttribute("stroke", col);
      e.setAttribute("stroke-width", sw); e.setAttribute("opacity", op);
      c.appendChild(e);
    }
    ring(outer, 7); ring(outer - 15, 3); ring(inner, 7);
    const hub = document.createElementNS(NS, "circle");
    hub.setAttribute("cx", cx); hub.setAttribute("cy", cy); hub.setAttribute("r", 26);
    hub.setAttribute("fill", col); hub.setAttribute("opacity", op);
    c.appendChild(hub);
    for (let i = 0; i < 24; i++) {
      const a = (i * 15 * Math.PI) / 180;
      const l = document.createElementNS(NS, "line");
      l.setAttribute("x1", cx + inner * Math.sin(a));
      l.setAttribute("y1", cy - inner * Math.cos(a));
      l.setAttribute("x2", cx + outer * Math.sin(a));
      l.setAttribute("y2", cy - outer * Math.cos(a));
      l.setAttribute("stroke", col); l.setAttribute("stroke-width", 3);
      l.setAttribute("opacity", op);
      c.appendChild(l);
    }
  </script>
</body>
</html>
