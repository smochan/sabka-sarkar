<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1000px; height: 1000px; overflow: hidden; }
  .stage {
    width: 1000px; height: 1000px; position: relative;
    /* warm paper ground with subtle radial depth */
    background:
      radial-gradient(circle at 50% 42%, #faf6ee 0%, #f4efe7 55%, #e9e2d4 100%);
  }
  svg { display: block; }
</style>
</head>
<body>
  <div class="stage">
    <svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- soft inner shadow ring to give the disc a minted, monument feel -->
        <radialGradient id="vig" cx="50%" cy="44%" r="62%">
          <stop offset="0%"  stop-color="#000000" stop-opacity="0"/>
          <stop offset="82%" stop-color="#000000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#5c5141" stop-opacity="0.14"/>
        </radialGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2c2418" flood-opacity="0.16"/>
        </filter>
      </defs>

      <!-- circle-safe guide is the centered disc; everything below sits inside r≈360 of (500,500) -->

      <!-- three rising bars: saffron -> ink -> green, ascending = civic progress -->
      <g filter="url(#soft)">
        <!-- bar 1 (saffron, shortest) -->
        <rect x="291" y="430" width="116" height="160" rx="58" fill="#FF9933"/>
        <!-- bar 2 (white, middle) — true tricolor; outline keeps it visible on paper -->
        <rect x="442" y="350" width="116" height="240" rx="58" fill="#ffffff"
              stroke="#5c5141" stroke-opacity="0.34" stroke-width="3"/>
        <!-- bar 3 (green, tallest) -->
        <rect x="593" y="262" width="116" height="328" rx="58" fill="#138808"/>
      </g>

      <!-- baseline ground rule the bars rise from -->
      <rect x="291" y="612" width="418" height="14" rx="7" fill="#1a1714" opacity="0.9"/>
      <!-- tricolor ticks under the baseline as a brand signature -->
      <rect x="291" y="648" width="126" height="12" rx="6" fill="#FF9933"/>
      <rect x="437" y="648" width="126" height="12" rx="6" fill="#ffffff" stroke="#5c5141" stroke-opacity="0.3" stroke-width="2"/>
      <rect x="583" y="648" width="126" height="12" rx="6" fill="#138808"/>

      <rect x="0" y="0" width="1000" height="1000" fill="url(#vig)"/>
    </svg>
  </div>
</body>
</html>
